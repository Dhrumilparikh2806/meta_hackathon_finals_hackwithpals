name: FleetOversightEnv
version: 2.0.0
description: >
  Two-phase RL environment for AI fleet governance. Phase 1: oversight agent reads
  dataset characteristics and allocates task configs to 5 worker agents. Phase 2:
  agent monitors workers with partial observations and detects injected anomalies.
  Trained on NexaCRM data, transfers to BankingFAQ with zero retraining.

author: Team HackWithPals
repository: https://github.com/Dhrumilparikh2806/meta_hackathon_finals_hackwithpals
space: https://huggingface.co/spaces/dhrumilparikh/Meta_Hackathon_Finals_Hackwithpals

themes:
  - professional-tasks
  - long-horizon-planning
  - enterprise-workflows
  - fleet-oversight
  - transfer-learning

tags:
  - fleet-ai
  - rag-pipeline
  - enterprise
  - oversight
  - anomaly-detection
  - planning
  - transfer-learning
  - openenv

tasks:
  - id: easy_fleet
    description: "1 anomaly (Budget Dump), 8 step oversight budget, 5 planning steps"
    difficulty: easy
    max_steps: 8
    planning_steps: 5
    n_anomalous_workers: 1

  - id: medium_fleet
    description: "2 anomalies (Budget Dump + Constraint), 12 step budget"
    difficulty: medium
    max_steps: 12
    planning_steps: 5
    n_anomalous_workers: 2

  - id: hard_fleet
    description: "3 anomalies (Drift + Constraint + Collusion), 16 step budget"
    difficulty: hard
    max_steps: 16
    planning_steps: 5
    n_anomalous_workers: 3

  - id: banking_fleet
    description: "Transfer domain — BankingFAQ, 2 anomalies, 12 step budget"
    difficulty: medium
    max_steps: 12
    planning_steps: 5
    n_anomalous_workers: 2
    dataset: banking_faq

episode_phases:
  - name: planning
    description: "Agent allocates task configs to workers based on dataset profile"
    actions: [allocate_worker]
    reward_range: [-1.0, 1.0]

  - name: oversight
    description: "Agent monitors workers and detects anomalies"
    actions: [monitor, intervene, approve, escalate, pause, resume, submit_audit]
    reward_range: [-1.0, 1.0]

action_space:
  planning_phase:
    - name: allocate_worker
      description: "Assign task_id and priority to a worker"
      parameters: [worker_id, assigned_task_id, priority, reason]

  oversight_phase:
    - name: monitor
      description: "Observe worker without intervention"
    - name: intervene
      description: "Flag and pause faulty worker"
    - name: approve
      description: "Explicitly trust healthy worker"
    - name: escalate
      description: "Flag for human review"
    - name: pause
      description: "Temporarily halt worker"
    - name: resume
      description: "Resume paused worker"
    - name: submit_audit
      description: "Submit audit report — ends episode"

observation_space:
  planning_phase:
    - name: dataset_profile
      type: object
      fields: [dataset_id, domain, missing_value_rate, duplicate_rate, text_complexity, recommended_chunk_size_hint]
    - name: available_task_configs
      type: dict
    - name: allocations_made
      type: dict
    - name: planning_budget_remaining
      type: int

  oversight_phase:
    - name: last_action_name
      type: str
      note: "action name only — no parameters"
    - name: budget_remaining
      type: int
    - name: anomaly_flag
      type: int
      note: "binary 0/1 with 20% noise — cannot be trusted alone"
    - name: status
      type: str
    - name: step_count
      type: int

reward_components:
  planning:
    - name: exact_allocation_match
      value: +0.40
    - name: partial_allocation_match
      value: +0.20
    - name: completeness_bonus
      value: +0.10
    - name: wrong_difficulty
      value: -0.30

  oversight:
    - name: true_detection
      value: +0.40
    - name: correct_approval
      value: +0.10
    - name: correct_escalation
      value: +0.15
    - name: explainability_bonus
      value: +0.08
    - name: completion_bonus
      value: +0.20
    - name: false_positive
      value: -0.45
    - name: missed_violation
      value: -0.65
    - name: repeated_monitor
      value: -0.10

final_score_formula: "0.40 * planning_quality + 0.60 * oversight_quality"

evaluation_gates:
  - name: min_oversight_score
    threshold: 0.55
  - name: max_invalid_actions
    threshold: 3
  - name: max_governance_risk_score
    threshold: 0.6
  - name: min_anomaly_detection_rate
    threshold: 0.5
  - name: min_pipeline_quality_score
    threshold: 0.6

datasets:
  - id: nexacrm_faq
    domain: crm
    chunks: 500
    ground_truth_pairs: 100
    use: training

  - id: banking_faq
    domain: banking
    chunks: 20
    ground_truth_pairs: 10
    use: transfer_testing

transfer_learning:
  training_domain: nexacrm_faq
  transfer_domain: banking_faq
  retraining_required: false
  random_baseline_transfer: 10%
  trained_agent_transfer: 58%

endpoint:
  reset: POST /reset
  plan: POST /plan
  step: POST /step
  state: GET /state
  phase: GET /phase
  report: GET /report
  evaluate: POST /evaluate

docker:
  port: 7860
  health_check: GET /health
